services:
  - type: web
    name: smart-resume-analyzer
    env: docker
    plan: starter  # At least 2GB RAM is recommended for Torch/NLP models
    healthCheckPath: /_stcore/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
        description: "Your OpenAI API Key"
      - key: GITHUB_TOKEN
        sync: false
        description: "GitHub Personal Access Token for profile analysis"
      - key: YOUTUBE_API_KEY
        sync: false
        description: "YouTube Data API Key for learning path recommendations"
      - key: DATABASE_URL
        value: "database/resume_analyzer.db"
    
    # Mount persistent disk for SQLite database
    disk:
      name: sqlite-db
      mountPath: /app/database
      sizeGB: 1

    # Auto-detection of Dockerfile
    dockerContext: .
    dockerFilePath: ./Dockerfile
